    <script>
        document.getElementById("scheduleForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const fileName = document.getElementById("pdfName").value.trim() || "課表";
            const { jsPDF } = window.jspdf;
            const element = document.querySelector(".table-container");

            const canvas = await html2canvas(element, {
                scale: 2,
                useCORS: true,
                onclone: (clonedDoc) => {

                    const clonedForm = clonedDoc.getElementById("scheduleForm");
                    if (clonedForm) clonedForm.style.display = "none";

                    const inputs = clonedDoc.querySelectorAll("#timetable input[type='text']");
                    inputs.forEach(input => {
                        const span = clonedDoc.createElement("span");
                        span.innerText = input.value;
                        span.className = "pdf-span";

                        span.style.color = window.getComputedStyle(input).color;
                        span.style.fontSize = window.getComputedStyle(input).fontSize;
                        span.style.fontWeight = "bold";

                        input.parentNode.insertBefore(span, input);
                        input.style.display = "none";
                    });
                }
            });

            const imgData = canvas.toDataURL("image/png");

            const pdf = new jsPDF({
                orientation: "landscape",
                unit: "mm",
                format: "a4"
            });

            const pdfWidth = pdf.internal.pageSize.getWidth();

            const pdfHeight = (canvas.height * pdfWidth / canvas.width);

            pdf.addImage(imgData, "PNG", 0, 0, pdfWidth, pdfHeight);
            pdf.save(fileName + ".pdf");
        });


        document.getElementById("scheduleTitle").addEventListener("input", function () {
            document.getElementById("displayTitle").innerText = this.value;
        });
    </script>
